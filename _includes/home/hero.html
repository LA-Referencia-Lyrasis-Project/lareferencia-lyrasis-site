{% assign lang = page.language | default: "es" %}
{% assign t = site.data.home[lang].sections[0] %}

<section class="ly-hero" id="acerca-de">
  <div class="ly-hero-inner wrapper">
    <img src="{{ '/assets/dspace-long.png' | relative_url }}" alt="DSpace" class="ly-dspace-long">
    <h1>{{ t.title_plain }}<span class="ly-hero-highlight">{{ t.title_highlight }}</span></h1>
    <p class="ly-hero-subtitle"><strong>{{ t.subtitle }}</strong></p>
    <p class="ly-hero-desc">{{ t.desc_plain }} <strong>{{ t.desc_bold }}</strong></p>
    <a href="{{ t.cta.href }}" class="ly-btn ly-btn-cta">{{ t.cta.label }}</a>
  </div>
</section>
