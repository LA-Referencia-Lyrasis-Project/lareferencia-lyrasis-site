    subtitle: "Projeto LA Referencia – Lyrasis"
    desc_plain: "O Projeto LA Referencia – Lyrasis é uma iniciativa conjunta concebida para fortalecer a adoção, o uso e a atualização do DSpace na comunidade de repositórios da América Latina e Espanha."
    desc_bold: "Por meio de uma abordagem abrangente, o projeto busca fornecer suporte técnico, documentação atualizada, treinamento especializado e desenvolvimento de ferramentas para melhorar a gestão de repositórios digitais na região."
