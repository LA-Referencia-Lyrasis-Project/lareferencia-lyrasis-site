  - type: team
    id: equipo
    title: "Nossa Equipe"
    subtitle: "Conheça as pessoas que tornam possível o Projeto LA Referencia – Lyrasis, trabalhando para fortalecer a adoção do DSpace na América Latina e Espanha."
    toggle_label: "Ler mais"
    toggle_label_alt: "Ler menos"
    members:
      - name: "Arturo Garduño Magaña"
        country: "MEX"
        role: "Coordenador do Projeto"
        bio: "Especialista em ciência aberta e gestão de metadados. Coordena o Projeto LA Referencia – Lyrasis desde fevereiro de 2025. Experiência em políticas públicas, infraestrutura de informação e avaliação científica. Foi Subdiretor no CONACYT México, Especialista no DataCite, e colabora com o Open Book Collective."
        photo: "arturo-garduno"
      - name: "Guillermo Esteban Murillo Goussen"
        country: "CRI"
        role: "Especialista Técnico — DSpace & OJS"
        bio: "Informático com mais de 15 anos em plataformas de ciência aberta, especialmente DSpace e OJS. Pesquisador, professor e informático no Escritório de Conhecimento Aberto da UCR. Consultor técnico em repositórios institucionais. Faz parte da equipe da LA Referencia desde 2019."
        photo: "guillermo-murillo"
      - name: "Héctor Alberto Miguel Ulloque Rodríguez"
        country: "COL"
        role: "Especialista em Documentação"
        bio: "Engenheiro de Sistemas, Mestrado em Governança de TI (U. del Norte, Colômbia). 15 anos no âmbito universitário, lidera a gestão tecnológica do repositório institucional da Universidad del Norte. Especialista em tradução e adaptação para o espanhol da documentação oficial do DSpace."
        photo: "hector-ulloque"
      - name: "Jesiel Viana"
        country: "BRA"
        role: "Especialista Técnico — Desenvolvimento de Software"
        bio: "Mestre em Engenharia de Software, MBA em Gestão de TI. Mais de uma década em desenvolvimento e liderança técnica. Colabora com o IBICT no desenvolvimento de repositórios nacionais (RIDI, Deposita, BrCris, Oasisbr). Participa do Projeto LA Referencia – Lyrasis."
        photo: "jesiel-viana"
      - name: "Luciana Mara Silva"
        country: "BRA"
        role: "Especialista em Documentação"
        bio: "Doutora em Ciência da Informação (UFSC). Mais de 15 anos em repositórios digitais. Bibliotecária na UDESC. Especialista em IA aplicada à pesquisa científica e gestão de dados de pesquisa."
        photo: "luciana-silva"
      - name: "Juan Sebastian Manitta"
        country: "ARG"
        role: "Desenvolvedor Frontend"
        bio: "Desenvolvedor frontend especializado em modernização de plataformas web e interfaces dinâmicas. Experiência em JavaScript/TypeScript, React, Angular e Tailwind. Desenvolve componentes reutilizáveis e integra fluxos frontend-backend no Projeto LA Referencia – Lyrasis."
        photo: "juan-manitta"
      - name: "Agustín Alfieri"
        country: "ARG"
        role: "Especialista em Suporte"
        bio: "Estudante de Engenharia de Sistemas de Informação com mais de 4 anos de experiência gerenciando sistemas e plataformas de ciência aberta. Responsável pela gestão de repositórios institucionais DSpace, interoperabilidade OAI-PMH e implementação de identificadores persistentes (PIDs). Atualmente faz parte da equipe de administração de sistemas da Universidade Nacional de Rosário, Argentina."
        photo: "agustin-alfieri"
      - name: "Gerardo Flores"
        country: "MEX"
        role: "Especialista em QA"
        bio: "Profissional com sete anos de experiência em repositórios institucionais baseados em DSpace e administração de ambientes Linux, especializado na administração e manutenção de repositórios de dados. Com conhecimento em implantação de serviços, administração de infraestrutura, integração de sistemas e automação de processos utilizando tecnologias de código aberto."
        photo: "gerardo-flores"
