  - type: pillars
    id: pilares
    title: "Nuestros Cuatro Pilares"
    items:
      - icon: docs
        title: "Documentación"
        desc: "Creación y actualización de guías en español y portugués sobre instalación, configuración y mejores prácticas de DSpace."
      - icon: support
        title: "Soporte Técnico"
        desc: "Implementación de un flujo de trabajo para asistencia a administradores de repositorios."
      - icon: training
        title: "Capacitación"
        desc: "Desarrollo de sesiones de formación, webinars y Open Hours para la comunidad."
      - icon: dev
        title: "Desarrollo"
        desc: "Adaptación e integración de mejoras en la plataforma DSpace según las necesidades de la región."

  - type: results
    id: resultados
    title: "Resultados Esperados"
    image_alt: "Ilustración de resultados del proyecto"
    periods:
      - title: "Primer Semestre de 2025"
        items:
          - "Actualización de la documentación técnica de DSpace a versiones más recientes."
          - "Implementación de al menos 3 jornadas de capacitación regionales."
          - "Publicación de al menos 5 guías prácticas actualizadas."
          - "Incorporación de al menos 2 instituciones adicionales a la red."
      - title: "A lo Largo de 2025"
        items:
          - "Fortalecimiento de la comunidad DSpace en la región con al menos 50 instituciones activas."
          - "Desarrollo de al menos 2 herramientas o plugins adaptados a necesidades locales."
          - "Establecimiento de una red de soporte técnico sostenible con cobertura multilingual."

