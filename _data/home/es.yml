  - type: about
    id: acerca-de
    title: "Acerca del Proyecto"
    paragraphs:
      - "El Proyecto LA Referencia – Lyrasis es una iniciativa conjunta diseñada para fortalecer la adopción, el uso y la actualización de DSpace en la comunidad de repositorios de América Latina y España."
      - "A través de un enfoque integral, el proyecto busca proporcionar soporte técnico, documentación actualizada, capacitación especializada y desarrollo de herramientas para mejorar la gestión de repositorios digitales en la región."
    image_alt: "DSpace logo"

