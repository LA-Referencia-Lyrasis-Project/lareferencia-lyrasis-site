  - type: team
    id: equipo
    title: "Our Team"
    subtitle: "Meet the people who make the LA Referencia – Lyrasis Project possible, working to strengthen DSpace adoption in Latin America and Spain."
    toggle_label: "Read more"
    toggle_label_alt: "Read less"
    members:
      - name: "Arturo Garduño Magaña"
        country: "MEX"
        role: "Project Coordinator"
        bio: "Open science and metadata management specialist. Coordinates the LA Referencia – Lyrasis Project since February 2025. Experience in public policies, information infrastructure, and scientific evaluation. Former Deputy Director at CONACYT Mexico, Specialist at DataCite, and collaborates with the Open Book Collective."
        photo: "arturo-garduno"
      - name: "Guillermo Esteban Murillo Goussen"
        country: "CRI"
        role: "Technical Specialist — DSpace & OJS"
        bio: "Computer scientist with over 15 years in open science platforms, especially DSpace and OJS. Researcher, professor, and computer scientist at the Open Knowledge Office of UCR. Technical consultant in institutional repositories. Part of the LA Referencia team since 2019."
        photo: "guillermo-murillo"
      - name: "Héctor Alberto Miguel Ulloque Rodríguez"
        country: "COL"
        role: "Documentation Specialist"
        bio: "Systems Engineer, Master's in IT Governance (U. del Norte, Colombia). 15 years in the university environment, leads the technological management of the institutional repository at Universidad del Norte. Specialist in translating and adapting official DSpace documentation into Spanish."
        photo: "hector-ulloque"
      - name: "Jesiel Viana"
        country: "BRA"
        role: "Technical Specialist — Software Development"
        bio: "Master's in Software Engineering, MBA in IT Management. Over a decade in software development and technical leadership. Collaborates with IBICT on national repository development (RIDI, Deposita, BrCris, Oasisbr). Participates in the LA Referencia – Lyrasis Project."
        photo: "jesiel-viana"
      - name: "Luciana Mara Silva"
        country: "BRA"
        role: "Documentation Specialist"
        bio: "Ph.D. in Information Science (UFSC). Over 15 years in digital repositories. Librarian at UDESC. Specialist in AI applied to scientific research and research data management."
        photo: "luciana-silva"
      - name: "Juan Sebastian Manitta"
        country: "ARG"
        role: "Frontend Developer"
        bio: "Frontend developer specialized in modernizing web platforms and dynamic interfaces. Experience in JavaScript/TypeScript, React, Angular, and Tailwind. Develops reusable components and integrates frontend-backend workflows in the LA Referencia – Lyrasis Project."
        photo: "juan-manitta"
      - name: "Agustín Alfieri"
        country: "ARG"
        role: "Support Specialist"
        bio: "Systems Engineering student with over 4 years of experience managing systems and open science platforms. Responsible for managing institutional DSpace repositories, OAI-PMH interoperability, and implementing persistent identifiers (PIDs). Currently part of the systems administration team at Universidad Nacional de Rosario, Argentina."
        photo: "agustin-alfieri"
      - name: "Gerardo Flores"
        country: "MEX"
        role: "QA Specialist"
        bio: "Professional with seven years of experience in DSpace-based institutional repositories and Linux environment administration, specialized in repository data management. Knowledgeable in service deployment, infrastructure administration, system integration, and process automation using open-source technologies."
        photo: "gerardo-flores"
