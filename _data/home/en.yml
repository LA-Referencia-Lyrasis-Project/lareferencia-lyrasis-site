    subtitle: "LA Referencia – Lyrasis Project"
    desc_plain: "The LA Referencia – Lyrasis Project is a joint initiative designed to strengthen the adoption, use, and upgrading of DSpace within the repository community of Latin America and Spain."
    desc_bold: "Through a comprehensive approach, the project aims to provide technical support, updated documentation, specialized training, and tool development to improve the management of digital repositories in the region."
